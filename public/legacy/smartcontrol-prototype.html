  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

── Color: Border ───────────────────────────────────────── */\n  --oeko-border:    rgb(221, 223, 224);\n  --oeko-divider:   rgb(87, 97, 100);\n\n  /* ─── Color: Accent (Blue family) ─────────────────────────── */\n  --oeko-blue:       rgb(100, 187, 224);  /* Primary blue accent (gradient buttons) */\n  --oeko-blue-soft:  rgb(204, 233, 245);  /* Blue gradient pair                     */\n\n  /* ─── Color: Brand Spectrum ──────────────────────────────────\n   * The signature gradient. Used on the Trennlinie (divider line),\n   * the logo leaf, and some text-on-image accents.\n   * Goes from yellow-green → green → teal → blue.\n   */\n  --oeko-brand-1: rgb(149, 193, 31);   /* #95C11F — yellow-green     */\n  --oeko-brand-2: rgb(90, 194, 77);    /* #5AC24D — green            */\n  --oeko-brand-3: rgb(0, 190, 116);    /* #00BE74 — emerald          */\n  --oeko-brand-4: rgb(0, 185, 151);    /* #00B997 — teal-green       */\n  --oeko-brand-5: rgb(0, 177, 179);    /* #00B1B3 — teal             */\n  --oeko-brand-6: rgb(0, 167, 198);    /* #00A7C6 — cyan             */\n  --oeko-brand-7: rgb(0, 155, 206);    /* #009BCE — sky              */\n  --oeko-brand-8: rgb(0, 142, 202);    /* #008ECA — blue             */\n\n  --oeko-brand-gradient: linear-gradient(\n    90deg,\n    var(--oeko-brand-1) 0%,\n    var(--oeko-brand-2) 14%,\n    var(--oeko-brand-3) 28%,\n    var(--oeko-brand-4) 41%,\n    var(--oeko-brand-5) 56%,\n    var(--oeko-brand-6) 70%,\n    var(--oeko-brand-7) 84%,\n    var(--oeko-brand-8) 100%\n  );\n\n  --oeko-blue-gradient: linear-gradient(\n    180deg,\n    var(--oeko-blue) 0%,\n    var(--oeko-blue-soft) 100%\n  );\n\n  /* ─── Spacing (16-base, multiples of 4/8) ─────────────────── */\n  --oeko-space-1:   4px;\n  --oeko-space-2:   8px;\n  --oeko-space-3:  12px;\n  --oeko-space-4:  16px;\n  --oeko-space-5:  24px;\n  --oeko-space-6:  32px;\n  --oeko-space-7:  48px;\n  --oeko-space-8:  64px;\n  --oeko-space-9:  96px;\n  --oeko-space-10: 128px;\n  --oeko-space-11: 160px;\n  --oeko-space-12: 192px;\n  --oeko-space-13: 256px;\n  --oeko-space-14: 384px;\n  --oeko-space-15: 512px;\n\n  /* ─── Radii ───────────────────────────────────────────────── */\n  --oeko-radius-sm:  8px;   /* small chips                          */\n  --oeko-radius-md: 12px;   /* cards, buttons, infoboxes (default)   */\n  --oeko-radius-lg: 18px;   /* hero / section background panels     */\n  --oeko-radius-xl: 25px;   /* outer content frame                  */\n\n  /* ─── Shadows / elevation ─────────────────────────────────── */\n  /* The system is almost flat — uses surface tinting for depth instead of shadows. */\n  --oeko-shadow-soft:   0 1px 2px rgba(0, 0, 0, 0.04);\n  --oeko-shadow-card:   0 4px 14px rgba(0, 0, 0, 0.06);\n  --oeko-shadow-hover:  0 8px 24px rgba(0, 0, 0, 0.08);\n\n  /* ─── Type ────────────────────────────────────────────────── */\n  --oeko-font-sans: \"Mulish\", system-ui, -apple-system, \"Segoe UI\", sans-serif;\n\n  --oeko-fw-light:    300;\n  --oeko-fw-regular:  400;\n\n  /* Type scale (figma stylesheet \"Font Size\") */\n  --oeko-fs-12: 12px;\n  --oeko-fs-14: 14px;\n  --oeko-fs-16: 16px;   /* small body                  */\n  --oeko-fs-18: 18px;   /* default body — most common  */\n  --oeko-fs-20: 20px;   /* light h-eyebrow             */\n  --oeko-fs-24: 24px;\n  --oeko-fs-25: 25px;   /* zitat (pull-quote)          */\n  --oeko-fs-30: 30px;   /* h2 — section headline       */\n  --oeko-fs-35: 35px;   /* h1 — page headline          */\n  --oeko-fs-36: 36px;\n  --oeko-fs-48: 48px;\n  --oeko-fs-60: 60px;\n  --oeko-fs-72: 72px;\n\n  /* Line heights — body is loose (1.8). Headlines hug their cap height. */\n  --oeko-lh-tight:   1;\n  --oeko-lh-snug:    1.125;     /* 18 → 20.25, used as 18/18 on titles too */\n  --oeko-lh-body:    1.8;       /* 18 → 32.4px (the figma default)         */\n  --oeko-lh-quote:   1.0;\n\n  /* Letter spacing — large display text uses a slight negative track */\n  --oeko-tracking-display: -0.01em;\n\n  /* ─── Motion ──────────────────────────────────────────────── */\n  --oeko-ease:     cubic-bezier(0.4, 0.0, 0.2, 1);\n  --oeko-dur-fast: 120ms;\n  --oeko-dur-base: 200ms;\n  --oeko-dur-slow: 320ms;\n}\n\n/* ─── Semantic helpers ────────────────────────────────────── */\n\nhtml {\n  font-family: var(--oeko-font-sans);\n  color: var(--oeko-text);\n  background: var(--oeko-surface);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nbody {\n  font-family: var(--oeko-font-sans);\n  font-size: var(--oeko-fs-18);\n  font-weight: var(--oeko-fw-regular);\n  line-height: var(--oeko-lh-body);\n  color: var(--oeko-text);\n  margin: 0;\n}\n\n.oeko-h1, h1 {\n  font-family: var(--oeko-font-sans);\n  font-weight: var(--oeko-fw-light);\n  font-size: var(--oeko-fs-35);\n  line-height: var(--oeko-lh-tight);\n  color: var(--oeko-text-strong);\n  letter-spacing: 0;\n  margin: 0;\n}\n\n.oeko-h2, h2 {\n  font-family: var(--oeko-font-sans);\n  font-weight: var(--oeko-fw-regular);\n  font-size: var(--oeko-fs-30);\n  line-height: var(--oeko-lh-tight);\n  letter-spacing: var(--oeko-tracking-display);\n  color: var(--oeko-text-strong);\n  margin: 0;\n}\n\n.oeko-h3, h3 {\n  font-family: var(--oeko-font-sans);\n  font-weight: var(--oeko-fw-light);\n  font-size: var(--oeko-fs-25);\n  line-height: var(--oeko-lh-tight);\n  color: var(--oeko-text-strong);\n  margin: 0;\n}\n\n.oeko-eyebrow {\n  font-family: var(--oeko-font-sans);\n  font-weight: var(--oeko-fw-light);\n  font-size: var(--oeko-fs-20);\n  line-height: var(--oeko-lh-tight);\n  color: var(--oeko-text);\n}\n\n.oeko-body, p {\n  font-family: var(--oeko-font-sans);\n  font-weight: var(--oeko-fw-regular);\n  font-size: var(--oeko-fs-18);\n  line-height: var(--oeko-lh-body);\n  color: var(--oeko-text);\n  margin: 0;\n}\n\n.oeko-body-sm {\n  font-size: var(--oeko-fs-16);\n  line-height: 1.5;\n  color: var(--oeko-text);\n}\n\n.oeko-quote {\n  font-family: var(--oeko-font-sans);\n  font-weight: var(--oeko-fw-light);\n  hint-placeholder-count=\"5\">\n              <button onclick=\"{{ p.onClick }}\" style=\"display:flex;align-items:center;gap:16px;width:100%;text-align:left;border:1px solid #EEF0F1;background:#FCFCFC;border-radius:12px;padding:15px 18px;cursor:pointer;font:inherit;transition:background .15s\" style-hover=\"background:#F4F7F7;border-color:#E2E5E6\">\n                <span style=\"width:9px;height:9px;border-radius:50%;flex:none;background:{{ p.dot }}\"><\u002Fspan>\n                <span style=\"flex:1;min-width:0\"><span style=\"font-size:14.5px;font-weight:600;color:#576164;display:block\">{{ p.name }}<\u002Fspan><span style=\"font-size:12px;color:#A4ABAC\">{{ p.loc }}<\u002Fspan><\u002Fspan>\n                <sc-if value=\"{{ advanced }}\" hint-placeholder-val=\"{{ true }}\">\n                  <span style=\"display:flex;gap:26px\">\n                    <span style=\"text-align:right\"><span style=\"font-size:10.5px;color:#B7BDBE;display:block\">Methane<\u002Fspan><span style=\"font-size:13.5px;color:#798183\">{{ p.methane }}<\u002Fspan><\u002Fspan>\n                    <span style=\"text-align:right\"><span style=\"font-size:10.5px;color:#B7BDBE;display:block\">H₂S<\u002Fspan><span style=\"font-size:13.5px;color:#798183\">{{ p.h2s }}<\u002Fspan><\u002Fspan>\n                    <span style=\"text-align:right\"><span style=\"font-size:10.5px;color:#B7BDBE;display:block\">Gas flow<\u002Fspan><span style=\"font-size:13.5px;color:#798183\">{{ p.gas }}<\u002Fspan><\u002Fspan>\n                  <\u002Fspan>\n                <\u002Fsc-if>\n                <span style=\"font-size:12.5px;color:#9AA1A3;width:70px;text-align:right\">{{ p.alertsLabel }}<\u002Fspan>\n                <span style=\"{{ p.chipStyle }}\">{{ p.chipLabel }}<\u002Fspan>\n                <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#C2C8C9\" stroke-width=\"1.8\"><path d=\"M9 6l6 6-6 6\"><\u002Fpath><\u002Fsvg>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ═══ FLEET · ANOMALY ═══ -->\n      <sc-if value=\"{{ vFleetAnomaly }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Fleet Anomaly\" style=\"display:flex;flex-direction:column;gap:20px;max-width:1280px\">\n        <div style=\"display:flex;gap:8px;flex-wrap:wrap;align-items:center\">\n          <span style=\"font-size:11px;font-weight:600;letter-spacing:.06em;color:#B7BDBE;margin-right:4px\">FILTER<\u002Fspan>\n          <sc-for list=\"{{ anomFilterChips }}\" as=\"c\" hint-placeholder-count=\"3\"><button onclick=\"{{ c.onClick }}\" style=\"{{ c.style }}\">{{ c.text }}<\u002Fbutton><\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:16px\">\n          <sc-for list=\"{{ anomSummary }}\" as=\"k\" hint-placeholder-count=\"3\">\n            <div style=\"background:#fff;border:1px solid #ECEEEF;border-radius:16px;padding:19px 20px;box-shadow:0 1px 3px rgba(0,0,0,.04)\">\n              <div style=\"font-size:12.5px;color:#9AA1A3;margin-bottom:9px\">{{ k.label }}<\u002Fdiv>\n              <div style=\"font-size:29px;font-weight:300;line-height:1;color:{{ k.color }}\">{{ k.value }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #ECEEEF;border-radius:18px;padding:24px;box-shadow:0 1px 3px rgba(0,0,0,.04)\">\n          <h2 style=\"font-size:18px;font-weight:600;color:#576164;margin:0 0 16px\">Active alerts by plant<\u002Fh2>\n          <div style=\"display:flex;flex-direction:column;gap:8px\">\n            <sc-if value=\"{{ anomListEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex;align-items:center;gap:14px;border:1px solid #DCEEE3;background:#F3FAF5;border-radius:12px;padding:18px 20px\">\n                <span style=\"width:38px;height:38px;border-radius:10px;background:#fff;display:flex;align-items:center;justify-content:center;flex:none\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1E9E63\" stroke-width=\"1.8\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n                <span><span style=\"font-size:14.5px;font-weight:600;color:#576164;display:block\">No active anomalies<\u002Fspan><span style=\"font-size:12.5px;color:#8B9294\">All plants are operating within normal ranges.<\u002Fspan><\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-for list=\"{{ anomalyRows }}\" as=\"r\" hint-placeholder-count=\"5\">\n              <div style=\"display:flex;align-items:center;gap:16px;border:1px solid {{ r.border }};background:{{ r.bg }};border-radius:12px;padding:15px 18px\">\n                <span style=\"width:9px;height:9px;border-radius:50%;flex:none;background:{{ r.dot }}\"><\u002Fspan>\n                <span style=\"flex:1;min-width:0\"><span style=\"font-size:14.5px;font-weight:600;color:#576164;display:block\">{{ r.name }}<\u002Fspan><span style=\"font-size:12px;color:#A4ABAC\">{{ r.detail }}<\u002Fspan><\u002Fspan>\n                <sc-if value=\"{{ r.hasOutcome }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"{{ r.outcomeStyle }}\">{{ r.outcomeLabel }}<\u002Fspan><\u002Fsc-if>\n                <span style=\"{{ r.chipStyle }}\">{{ r.chipLabel }}<\u002Fspan>\n                <sc-if value=\"{{ r.hasAlert }}\" hint-placeholder-val=\"{{ true }}\"><button onclick=\"{{ r.onView }}\" style=\"border:0;background:transparent;color:#8A6A28;font:inherit;font-size:12.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px;padding:4px 2px\" style-hover=\"color:#5F4915\">View alerts<svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\"><path d=\"M9 6l6 6-6 6\"><\u002Fpath><\u002Fsvg><\u002Fbutton><\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ═══ FLEET · REPORT ═══ -->\n      <sc-if value=\"{{ vFleetReport }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Monthly Report\" style=\"display:flex;flex-direction:column;gap:20px;max-width:1280px\">\n        <div style=\"display:flex;gap:8px;flex-wrap:wrap;align-items:center\">\n          <span style=\"font-size:11px;font-weight:600;letter-spacing:.06em;color:#B7BDBE;margin-right:4px\">REPORT SCOPE<\u002Fspan>\n          <sc-for list=\"{{ reportScopeChips }}\" as=\"c\" hint-placeholder-count=\"3\"><button onclick=\"{{ c.onClick }}\" style=\"{{ c.style }}\">{{ c.text }}<\u002Fbutton><\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #ECEEEF;border-radius:18px;padding:24px 26px;box-shadow:0 1px 3px rgba(0,0,0,.04);display:flex;align-items:center;gap:20px;flex-wrap:wrap\">\n          <div style=\"flex:1;min-width:280px\">\n            <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:6px\"><h2 style=\"font-size:20px;font-weight:600;color:#576164;margin:0\">{{ reportTitle }}<\u002Fh2><span style=\"font-size:11px;font-weight:600;color:#C6841A;background:#FBEFD6;border-radius:20px;padding:4px 12px\">DRAFT READY<\u002Fspan><\u002Fdiv>\n            <p style=\"font-size:13.5px;color:#A4ABAC;margin:0\">{{ reportScopeLabel }} · generated from OEKOBIT-reviewed data · awaiting expert approval<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:10px\">\n            <button onclick=\"{{ reportEdit }}\" style=\"border:1px solid #E2E5E6;background:#fff;border-radius:10px;padding:11px 18px;font:inherit;font-size:13px;font-weight:600;color:#798183;cursor:pointer\">Edit draft<\u002Fbutton>\n            <button onclick=\"{{ reportApprove }}\" style=\"border:0;background:#1E9E63;color:#fff;border-radius:10px;padding:11px 18px;font:inherit;font-size:13px;font-weight:600;cursor:pointer\">Approve            <h3 style=\"font-size:16px;font-weight:600;color:#576164;margin:0 0 14px\">Process metrics — monthly statistics<\u002Fh3>\n            <div style=\"display:grid;grid-template-columns:1.4fr repeat(4,1fr);gap:8px;font-size:12.5px\">\n              <div style=\"font-weight:700;color:#B7BDBE;font-size:10.5px;letter-spacing:.06em\">VARIABLE<\u002Fdiv><div style=\"font-weight:700;color:#B7BDBE;font-size:10.5px;text-align:right\">MIN<\u002Fdiv><div style=\"font-weight:700;color:#B7BDBE;font-size:10.5px;text-align:right\">AVG<\u002Fdiv><div style=\"font-weight:700;color:#B7BDBE;font-size:10.5px;text-align:right\">MAX<\u002Fdiv><div style=\"font-weight:700;color:#B7BDBE;font-size:10.5px;text-align:right\">UNIT<\u002Fdiv>\n              <sc-for list=\"{{ reportStats }}\" as=\"r\" hint-placeholder-count=\"6\">\n                <div style=\"color:#798183;font-family:ui-monospace,Menlo,monospace;border-top:1px solid #F4F5F5;padding:8px 0\">{{ r.name }}<\u002Fdiv><div style=\"color:#576164;text-align:right;border-top:1px solid #F4F5F5;padding:8px 0\">{{ r.min }}<\u002Fdiv><div style=\"color:#576164;text-align:right;border-top:1px solid #F4F5F5;padding:8px 0\">{{ r.avg }}<\u002Fdiv><div style=\"color:#576164;text-align:right;border-top:1px solid #F4F5F5;padding:8px 0\">{{ r.max }}<\u002Fdiv><div style=\"color:#A4ABAC;text-align:right;border-top:1px solid #F4F5F5;padding:8px 0\">{{ r.unit }}<\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ═══ CUSTOMER (fleet filtered OR plant) ═══ -->\n      <sc-if value=\"{{ vCustomer }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Messages\" style=\"display:flex;flex-direction:column;gap:12px;max-width:820px;width:100%;margin:0 auto\">\n\n        <!-- INBOX -->\n        <sc-if value=\"{{ showInbox }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:2px\">\n            <span style=\"font-size:13px;color:#A4ABAC;font-weight:600\">{{ inboxCountLabel }}<\u002Fspan>\n            <sc-if value=\"{{ canCompose }}\" hint-placeholder-val=\"{{ true }}\"><button onclick=\"{{ openCompose }}\" style=\"display:flex;align-items:center;gap:7px;border:0;background:#2C87B4;color:#fff;border-radius:10px;padding:9px 15px;font:inherit;font-size:13px;font-weight:600;cursor:pointer\" style-hover=\"background:#246F94\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg>New message<\u002Fbutton><\u002Fsc-if>\n          <\u002Fdiv>\n          <sc-if value=\"{{ inboxEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background:#fff;border:1px solid #ECEEEF;border-radius:18px;padding:56px 24px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.04)\">\n              <span style=\"width:52px;height:52px;border-radius:14px;background:#EEF3F5;display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px\"><svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#9FB6BF\" stroke-width=\"1.6\"><path d=\"M4 5h16v11H8l-4 4z\"><\u002Fpath><path d=\"M8 10h8M8 13h5\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n              <div style=\"font-size:15px;font-weight:600;color:#798183;margin-bottom:6px\">{{ inboxEmptyTitle }}<\u002Fdiv>\n              <div style=\"font-size:13px;color:#A4ABAC;line-height:1.55;max-width:360px;margin:0 auto 18px\">{{ inboxEmptySub }}<\u002Fdiv>\n              <sc-if value=\"{{ inboxEmptyCanCompose }}\" hint-placeholder-val=\"{{ true }}\"><button onclick=\"{{ openCompose }}\" style=\"display:inline-flex;align-items:center;gap:7px;border:0;background:#2C87B4;color:#fff;border-radius:10px;padding:10px 18px;font:inherit;font-size:13.5px;font-weight:600;cursor:pointer\" style-hover=\"background:#246F94\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg>New message<\u002Fbutton><\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <div style=\"display:flex;flex-direction:column;gap:9px\">\n            <sc-for list=\"{{ inboxList }}\" as=\"c\" hint-placeholder-count=\"4\">\n              <button onclick=\"{{ c.onOpen }}\" style=\"{{ c.rowStyle }}\" style-hover=\"border-color:#B9DDEF\">\n                <span style=\"{{ c.avStyle }}\">{{ c.avInit }}<\u002Fspan>\n                <span style=\"flex:1;min-width:0\">\n                  <span style=\"display:flex;align-items:center;gap:9px\"><span style=\"font-size:14.5px;font-weight:600;color:#576164\">{{ c.name }}<\u002Fspan><sc-if value=\"{{ c.hasStatus }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"{{ c.statusChipStyle }}\">{{ c.statusLabel }}<\u002Fspan><\u002Fsc-if><\u002Fspan>\n                  <span style=\"font-size:11.5px;color:#A4ABAC;display:block;margin-top:2px\">{{ c.subName }}<\u002Fspan>\n                  <span style=\"font-size:12.5px;color:{{ c.previewColor }};display:block;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:560px\">{{ c.preview }}<\u002Fspan>\n                <\u002Fspan>\n                <span style=\"display:flex;flex-direction:column;align-items:flex-end;gap:7px;flex:none\">\n                  <span style=\"font-size:11px;color:#B7BDBE\">{{ c.time }}<\u002Fspan>\n                  <sc-if value=\"{{ c.showUnread }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"{{ c.unreadStyle }}\">{{ c.unread }}<\u002Fspan><\u002Fsc-if>\n                <\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <sc-if value=\"{{ composeOpen }}\" hint-placeholder-val=\"{{ false }}\">\n            <div onclick=\"{{ closeCompose }}\" style=\"position:fixed;inset:0;background:rgba(30,40,44,.35 n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:16px\">\n            <div style=\"background:#fff;border:1px solid #ECEEEF;border-radius:18px;padding:22px;box-shadow:0 1px 3px rgba(0,0,0,.04)\">\n              <h2 style=\"font-size:17px;font-weight:600;color:#576164;margin:0 0 4px\">AI explanation<\u002Fh2>\n              <div style=\"font-size:12px;color:#A4ABAC;margin-bottom:12px\">Prepared for expert validation<\u002Fdiv>\n              <p style=\"font-size:13px;line-height:1.65;color:#798183;margin:0 0 14px\">{{ anomExplain }}<\u002Fp>\n              <span style=\"display:inline-block;font-size:11px;font-weight:600;color:#C6841A;background:#FBEFD6;border-radius:20px;padding:5px 13px\">EXPERT REVIEW REQUIRED<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"background:#fff;border:1px solid #ECEEEF;border-radius:18px;padding:22px;box-shadow:0 1px 3px rgba(0,0,0,.04)\">\n              <h2 style=\"font-size:17px;font-weight:600;color:#576164;margin:0 0 6px\">Expert decision<\u002Fh2>\n              <div style=\"font-size:12px;color:#A4ABAC;margin-bottom:16px\">Review the signal, then decide the outcome.<\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:10px\">\n                <button onclick=\"{{ openConfirm }}\" style=\"border:0;border-radius:11px;padding:13px;font:inherit;font-size:13.5px;font-weight:600;color:#fff;background:#1E9E63;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px\"><svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg>Confirm anomaly &amp; define measures<\u002Fbutton>\n                <button onclick=\"{{ decData }}\" style=\"border:1px solid #D3DEE3;border-radius:11px;padding:13px;font:inherit;font-size:13.5px;font-weight:600;color:#2C6E8A;background:#fff;cursor:pointer\" style-hover=\"background:#F4F9FB\">Request display:flex;align-items:center;justify-content:center\">×<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"flex:1;overflow-y:auto;padding:16px\">\n        <sc-for list=\"{{ messages }}\" as=\"m\" hint-placeholder-count=\"1\"><div style=\"{{ m.rowStyle }}\"><div style=\"{{ m.bubbleStyle }}\">{{ m.t }}<\u002Fdiv><\u002Fdiv><\u002Fsc-for>\n        <sc-if value=\"{{ typing }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"display:flex;gap:4px;padding:8px 4px\"><span style=\"width:7px;height:7px;border-radius:50%;background:#C2C8C9;animation:blink 1.2s infinite\"><\u002Fspan><span style=\"width:7px;height:7px;border-radius:50%;background:#C2C8C9;animation:blink 1.2s infinite .2s\"><\u002Fspan><span style=\"width:7px;height:7px;border-radius:50%;background:#C2C8C9;animation:blink 1.2s infinite .4s\"><\u002Fspan><\u002Fdiv><\u002Fsc-if>\n      <\u002Fdiv>\n      <div style=\"padding:12px 14px;border-top:1px solid #EEF0F1\">\n        <div style=\"display:flex;gap:7px;flex-wrap:wrap;margin-bottom:11px\">\n          <sc-for list=\"{{ suggestions }}\" as=\"s\" hint-placeholder-count=\"3\"><button onclick=\"{{ s.onClick }}\" style=\"border:1px solid #E4EEF3;background:#F5F9FB;color:#2A6379;border-radius:16px;padding:6px 12px;font:inherit;font-size:12px;cursor:pointer\" style-hover=\"background:#EAF3F7\">{{ s.text }}<\u002Fbutton><\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:8px;align-items:center;background:#F4F5F5;border-radius:12px;padding:5px 5px 5px 14px\">\n          <input value=\"{{ draft }}\" oninput=\"{{ onDraft }}\" onkeydown=\"{{ onKey }}\" placeholder=\"Ask a question…\" style=\"flex:1;border:0;background:transparent;font:inherit;font-size:13.5px;color:#576164;outline:none\">\n          <button onclick=\"{{ send }}\" style=\"border:0;width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#5CB4DE,#38A4D4);cursor:pointer;display:flex;align-items:center;justify-content:center;flex:none\"><svg width=\"17\" heigh padding:12px 20px;font:inherit;font-size:13.5px;font-weight:600;cursor:pointer\" style-hover=\"background:#F4F7F7\">Close<\u002Fbutton>\n            <button onclick=\"{{ goToRequestsFromModal }}\" style=\"border:0;background:#1E9E63;color:#fff;border-radius:10px;padding:12px 22px;font:inherit;font-size:13.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px\" style-hover=\"filter:brightness(1.05)\">Go to Messages<svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ reviewModalForm }}\" hint-placeholder-val=\"{{ true }}\">\n        <!-- form -->\n        <div style=\"padding:26px 30px 20px;border-bottom:1px solid #EEF0F1;display:flex;align-items:flex-start;gap:14px\">\n          <span style=\"width:42px;height:42px;border-radius:11px;background:#E4F1FA;display:flex;align-items:center;justify-content:center;flex:none\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#2C87B4\" stroke-width=\"1.7\"><path d=\"M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2\"><\u002Fpath><circle cx=\"9\" cy=\"7\" r=\"4\"><\u002Fcircle><path d=\"M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          <div style=\"flex:1;min-width:0\">\n            <h2 style=\"font-size:19px;font-weight:600;color:#576164;margin:0 0 3px\">Send to expert for review<\u002Fh2>\n            <p style=\"font-size:13px;color:#9AA1A3;margin:0;line-height:1.5\">Bernd Biogas, your OEKOBIT process expert, will assess this anomaly and reply in Messages.<\u002Fp>\n          <\u002Fdiv>\n          <button onclick=\"{{ closeReviewModal }}\" style=\"border:0;background:#F0F1F1;width:30px;height:30px;border-radius:9px;cursor:pointer;color:#798183;font-size:17px;display:flex;align-items:center;justify-content:center;flex:none\" style-hover=\"background:#E7E9E9\">×<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"padding:22px 30px 28px;display:flex;flex-direction:column;gap:20px\">\n          <div style=\"background:#FDF8EE;border:1px solid #F1E2C4;border-radius:12px;padding:14px 16px\">\n            <div style=\"font-size:11px;font-weight:700;letter-spacing:.06em;color:#C6841A;margin-bottom:6px\">ANOMALY<\u002Fdiv>\n            <div style=\"font-size:15px;font-weight:600;color:#576164;margin-bottom:3px\">{{ reviewAnomTitle }}<\u002Fdiv>\n            <div style=\"font-size:12.5px;color:#9AA1A3\">{{ reviewAnomSummary }}<\u002Fdiv>\n            <div style=\"font-size:13px;color:#798183;margin-top:8px;line-height:1.5\">These readings were grouped into one anomaly and flagged for expert review.<\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px\"><span style=\"font-size:13px;font-weight:600;color:#576164\">Recommended actions<\u002Fspan><span style=\"font-size:11.5px;color:#A4ABAC\">{{ reviewDoneLabel }}<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:8px\">\n              <sc-for list=\"{{ reviewItems }}\" as=\"r\" hint-placeholder-count=\"3\">\n                <div style=\"display:flex;align-items:center;gap:12px;border:1px solid #EEF0F1;border-radius:10px;padding:11px 14px\">\n                  <span style=\"width:20px;height:20px;border-radius:6px;border:1.5px solid {{ r.boxBorder }};background:{{ r.boxBg }};color:#fff;font-size:12px;font-weight:700;line-height:1;display:flex;align-items:center;justify-content:center;flex:none\">{{ r.mark }}<\u002Fspan>\n                  <span style=\"flex:1;font-size:13.5px;color:{{ r.textColor }}\">{{ r.text }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <label style=\"font-size:13px;font-weight:600;color:#576164;display:block;margin-bottom:8px\">Message to the expert<\u002Flabel>\n            <textarea value=\"{{ reviewNote }}\" oninput=\"{{ onReviewNote }}\" placeholder=\"Describe what you have observed on site, what you already checked, and any question for the expert…\" style=\"width:100%;box-sizing:border-box;min-height:110px;resize:vertical;border:1px solid #E2E5E6;border-radius:12px;padding:13px 15px;font:inherit;font-size:13.5px;line-height:1.6;color:#576164;outline:none\" style-focus=\"border-color:#38A4D4\"><\u002Ftextarea>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:10px;justify-content:flex-end\">\n            <button onclick=\"{{ closeReviewModal }}\" style=\"border:1px solid #E2E5E6;background:#fff;color:#798183;border-radius:10px;padding:12px 20px;font:inherit;font-size:13.5px;font-weight:600;cursor:pointer\" style-hover=\"background:#F4F7F7\">Cancel<\u002Fbutton>\n            <button onclick=\"{{ submitReview }}\" disabled=\"{{ reviewSubmitDisabled }}\" style=\"{{ reviewSubmitStyle }}\" style-hover=\"filter:brightness(1.05)\">Submit to expert<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ═══ CONFIRM ANOMALY · EXPERT MODAL ═══ -->\n  <sc-if value=\"{{ confirmModalOpen }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"position:fixed;inset:0;z-index:60;background:rgba(40,52,54,.42);display:flex;align-items:center;justify-content:center;padding:32px\">\n    <div style=\"width:100%;max-width:580px;max-height:88vh;overflow-y:auto;background:#fff;border-radius:20px;box-shadow:0 24px 60px rgba(0,0,0,.22)\">\n      <div style=\"padding:24px 30px 18px;border-bottom:1px solid #F0F1F1;display:flex;align-items:flex-start;gap:14px\">\n        <span style=\"width:42px;height:42px;border-radius:12px;background:#E4F4EA;display:flex;align-items:center;justify-content:center;flex:none\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1E9E63\" stroke-width=\"1.8\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <div style=\"flex:1;min-width:0\">\n          <h2 style=\"font-size:19px;font-weight:600;color:#576164;margin:0 0 3px\">Confirm anomaly &amp; define measures<\u002Fh2>\n          <p style=\"font-size:13px;color:#9AA1A3;margin:0;line-height:1.5\">The measures below become {{ confirmForName }}'s action plan — shown on the anomaly dashboard and sent to Messages.<\u002Fp>\n        <\u002Fdiv>\n        <button onclick=\"{{ closeConfirm }}\" style=\"border:0;background:#F0F1F1;width:30px;height:30px;border-radius:9px;cursor:pointer;color:#798183;font-size:17px;display:flex;align-items:center;justify-content:center;flex:none\">×<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"padding:22px 30px 28px;display:flex;flex-direction:column;gap:20px\">\n        <div style=\"background:#FDF8EE;border:1px solid #F1E2C4;border-radius:12px;padding:13px 16px\">\n          <div style=\"font-size:11px;font-weight:700;letter-spacing:.06em;color:#C6841A;margin-bottom:5px\">ANOMALY<\u002Fdiv>\n          <div style=\"font-size:15px;font-weight:600;color:#576164\">{{ reviewAnomTitle }}<\u002Fdiv>\n          <div style=\"font-size:12.5px;color:#9AA1A3;margin-top:2px\">{{ reviewAnomSummary }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <label style=\"font-size:13px;font-weight:600;color:#576164;display:block;margin-bottom:4px\">Measures<\u002Flabel>\n          <div style=\"font-size:12px;color:#A4ABAC;margin-bottom:8px\">One measure per line — these become checkable tasks for the operator.<\u002Fdiv>\n          <textarea value=\"{{ measuresDraft }}\" oninput=\"{{ onMeasuresDraft }}\" placeholder=\"e.g. Reduce the latest feedstock batch by ~15 % for 48 h\nRe-test the lab sample tomorrow\nRaise desulphurisation dosing if H₂S stays above 1000 ppm\" style=\"width:100%;box-sizing:border-box;min-height:120px;resize:vertical;border:1px solid #E2E5E6;border-radius:12px;padding:13px 15px;font:inherit;font-size:13.5px;line-height:1.7;color:#576164;outline:none\" style-focus=\"border-color:#1E9E63\"><\u002Ftextarea>\n        <\u002Fdiv>\n        <div>\n          <label style=\"font-size:13px;font-weight:600;color:#576164;display:block;margin-bottom:8px\">Note to the operator <span style=\"font-weight:400;color:#A4ABAC\">· optional<\u002Fspan><\u002Flabel>\n          <textarea value=\"{{ confirmMsg }}\" oninput=\"{{ onConfirmMsg }}\" placeholder=\"Explain your assessment and why these steps matter…\" style=\"width:100%;box-sizing:border-box;min-height:80px;resize:vertical;border:1px solid #E2E5E6;border-radius:12px;padding:13px 15px;font:inherit;font-size:13.5px;line-height:1.6;color:#576164;outline:none\" style-focus=\"border-color:#1E9E63\"><\u002Ftextarea>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:10px;justify-content:flex-end\">\n          <button onclick=\"{{ closeConfirm }}\" style=\"border:1px solid #E2E5E6;background:#fff;color:#798183;border-radius:10px;padding:12px 20px;font:inherit;font-size:13.5px;font-weight:600;cursor:pointer\" style-hover=\"background:#F4F7F7\">Cancel<\u002Fbutton>\n          <button onclick=\"{{ confirmAnomaly }}\" disabled=\"{{ confirmDisabled }}\" style=\"{{ confirmSubmitStyle }}\" style-hover=\"filter:brightness(1.05)\">Confirm &amp; send measures<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    scope: 'fleet', fModule: 'overview', pModule: 'dashboard', anomAlert: null,\n    hist: [{ scope:'fleet', fModule:'overview', pModule:'dashboard', anomAlert:null }], hi: 0, userMenuOpen: false,\n    role: 'client', level: 'basic',\n    anomFilter: 'all', custFilter: 'all', reportScope: 'all',\n    copilotOpen: false, draft: '', typing: false, decision: '', selUpdate: 0, custNote: '', reportNote: '',\n    threads: {}, threadsClosed: {}, readMap: {}, caseStatus: {}, msgPlant: null, threadDraft: '',\n    composeSubject: '', composeTarget: 'general', composeTopic: '', subjects: {},\n    messages: [{ u: false, t: \"Hi, I'm your Plant Colleague. I explain alerts, interpret values and suggest actions. What would you like to know?\" }]\n  };\n\n  navTo(route, extra){ this.setState(s=>{ const h=s.hist.slice(0,s.hi+1); h.push(route); return Object.assign({}, route, extra||{}, { hist:h, hi:h.length-1, userMenuOpen:false }); }); }\n  back(){ this.setState(s=> s.hi>0 ? Object.assign({}, s.hist[s.hi-1], { hi:s.hi-1 }) : {}); }\n  forward(){ this.setState(s=> s.hi<s.hist.length-1 ? Object.assign({}, s.hist[s.hi+1], { hi:s.hi+1 }) : {}); }\n  goFleet(mod){ this.navTo({ scope:'fleet', fModule:mod, pModule:'dashboard', anomAlert:null }, { decision:'', custNote:'', reportNote:'', msgPlant:null }); }\n  enterPlant(i){ this.navTo({ scope:i, fModule:'overview', pModule:'dashboard', anomAlert:null }); }\n  goPlant(mod){ this.navTo({ scope:this.state.scope, fModule:'overview', pModule:mod, anomAlert:null }, { decision:'', custNote:'', msgPlant:null }); }\n  backToFleet(){ this.navTo({ scope:'fleet', fModule:'overview', pModule:'dashboard', anomAlert:null }); }\n  openAlert(i){ this.navTo({ scope:this.state.scope, fModule:'overview', pModule:'anomaly', anomAlert:i }, { decision:'' }); }\n  backToAlerts(){ this.navTo({ scope:this.state.scope, fModule:'overview', pModule:'anomaly', anomAlert:null }); }\n  now(){ const d=new Date(); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }\n  openThreadView(pi){ if(pi==='ai'){ this.setState({ msgPlant:'ai', threadDraft:'' }); return; } this.setState(s=>{ const rd={...(s.readMap||{})}; rd[pi]=((s.threads||{})[pi]||[]).length; return { msgPlant:pi, readMap:rd, threadDraft:'' }; }); }\n  startCompose(){ const S=this.state; const subj=(S.composeSubject||'').trim(); if(!subj) return; const key=S.composeTarget; this.setState(s=>{ const subs={...(s.subjects||{})}; subs[key]=subj; const th={...(s.threads||{})}; if(!th[key]) th[key]=[]; const rd={...(s.readMap||{})}; rd[key]=th[key].length; return { subjects:subs, threads:th, readMap:rd, composeOpen:false, msgPlant:key, threadDraft:'', composeSubject:'', composeTopic:'', composeTarget:'general' }; }); }\n  backToInbox(){ this.setState({ msgPlant:null }); }\n  sendThread(){ const S=this.state; const pi=S.msgPlant; if(pi==null) return; const t=(S.threadDraft||'').trim(); if(!t) return; if(pi==='ai'){ this.setState({ threadDraft:'' }); this.askThread(t); return; } const from=S.role==='client'?'julia':'bernd'; const msg={ id:Date.now(), from, kind:'text', text:t, time:this.now() };\n    this.setState(s=>{ const th={...(s.threads||{})}; th[pi]=[...(th[pi]||[]), msg]; const rc={...(s.threadsClosed||{})}; rc[pi]=false; const rd={...(s.readMap||{})}; rd[pi]=th[pi].length; return { threads:th, threadsClosed:rc, readMap:rd, threadDraft:'' }; }); }\n  askThread(t){ this.setState(s=>({ messages:[...s.messages,{u:true,t}], typing:true })); const reply=this.replyFor(t); setTimeout(()=>this.setState(s=>({ messages:[...s.messages,{u:false,t:reply}], typing:false })),650); }\n  onThreadDraft(e){ this.setState({ threadDraft:e.target.value }); }\n  fmtSize(b){ if(b<1024) return b+' B'; if(b<1048576) return (b/1024).toFixed(0)+' KB'; return (b/1048576).toFixed(1)+' MB'; }\n  onAttach(e){ const files=[...(e.target.files||[])]; if(!files.length) return; const S=this.state; const pi=S.msgPlant; if(pi==null) return; const from=S.role==='client'?'julia':'bernd'; const t=this.now(); const msgs=files.map((f,k)=>({ id:Date.now()+k, from, kind:'file', fileName:f.name, fileSize:this.fmtSize(f.size), time:t })); this.setState(s=>{ const th={...(s.threads||{})}; th[pi]=[...(th[pi]||[]), ...msgs]; const rc={...(s.threadsClosed||{})}; rc[pi]=false; const rd={...(s.readMap||{})}; rd[pi]=th[pi].length; return { threads:th, threadsClosed:rc, readMap:rd }; }); e.target.value=''; }\n  onThreadKey(e){ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); this.sendThread(); } }\n  openReport(pi,ai){ this.navTo({ scope:pi, fModule:'overview', pModule:'anomaly', anomAlert:ai }); }\n  closeCase(){ const pi=this.state.msgPlant; if(pi==null) return; this.setState(s=>{ const th={...(s.threads||{})}; th[pi]=[...(th[pi]||[]), { id:Date.now(), from:'bernd', kind:'status', outcome:'closed', text:'Case closed. You can reopen it any time by sending a new message.', time:this.now() }]; const rc={...(s.threadsClosed||{})}; rc[pi]=true; return { threads:th, threadsClosed:rc }; }); }\n  decide(kind){\n    const map={ approve:'Anomaly confirmed. I reviewed the readings and the pattern is genuine. Recommended: reduce the latest feedstock batch by ~15 % for 48 h and re-test the lab sample. If H₂S stays above 1000 ppm, raise desulphurisation dosing. I will monitor Digester 2 and follow up in 24 h.', edit:'Recommendation adjusted. The trend is real but milder than the model scored it. Keep the feedstock as-is, re-test the lab sample tomorrow and watch the Digester 2 trend — no dosing change needed yet.', false:'Marked as false alarm. The readings match a known H₂S sensor drift, not a real process issue. No action needed; the probe is scheduled for recalibration.', data:'More data requested. Please share the latest lab sample and the feedstock batch notes so I can confirm the cause before recommending a step.' };\n    const body=map[kind]||''; const sc=this.state.scope;\n    this.setState(s=>{\n      const th={...(s.threads||{})}; let msgs=(th[sc]||[]).map(m=> (m.kind==='report')?{...m, report:{...m.report, decided:true, outcome:kind}}:m );\n      msgs=msgs.filter(m=> !(m.kind==='reply'));\n      msgs.push({ id:Date.now(), from:'bernd', kind:'reply', outcome:kind, text:body, time:this.now() });\n      th[sc]=msgs; const cs={...(s.caseStatus||{})}; cs[sc]=kind;\n      return { threads:th, caseStatus:cs, decision:kind };\n    });\n    this.navTo({ scope:sc, fModule:this.state.fModule, pModule:'customer', anomAlert:null }, { msgPlant:sc });\n  }\n  toggleCopilot(){ this.setState(s => ({ copilotOpen: !s.copilotOpen })); }\n  openConfirm(){ const sc=this.state.scope; const A=this.anomDef()[sc]; const pre=A?A.actions.join('\\n'):''; this.setState(s=>({ confirmModalOpen:true, measuresDraft: (s.measures&&s.measures[sc]&&s.measures[sc].length)? s.measures[sc].join('\\n') : pre, confirmMsg:'' })); }\n  closeConfirm(){ this.setState({ confirmModalOpen:false }); }\n  onMeasuresDraft(e){ this.setState({ measuresDraft:e.target.value }); }\n  onConfirmMsg(e){ this.setState({ confirmMsg:e.target.value }); }\n  confirmAnomaly(){\n    const S=this.state; const sc=S.scope;\n    const lines=(S.measuresDraft||'').split('\\n').map(t=>t.trim()).filter(Boolean);\n    if(!lines.length) return;\n    const note=(S.confirmMsg||'').trim();\n    const body=(note?note+'\\n\\n':'')+'Confirmed measures:\\n'+lines.map(l=>'• '+l).join('\\n');\n    this.setState(s=>{\n      const th={...(s.threads||{})}; let msgs=(th[sc]||[]).map(m=> (m.kind==='report')?{...m, report:{...m.report, decided:true, outcome:'approve'}}:m );\n      msgs=msgs.filter(m=> m.kind!=='reply');\n      msgs.push({ id:Date.now(), from:'bernd', kind:'reply', outcome:'approve', text:body, time:this.now() });\n      th[sc]=msgs;\n      const cs={...(s.caseStatus||{})}; cs[sc]='approve';\n      const mm={...(s.measures||{})}; mm[sc]=lines;\n      const rd={...(s.readMap||{})}; rd[sc]=(rd[sc]||0);\n      return { threads:th, caseStatus:cs, measures:mm, decision:'approve', confirmModalOpen:false, measuresDraft:'', confirmMsg:'' };\n    });\n    this.navTo({ scope:sc, fModule:this.state.fModule, pModule:'customer', anomAlert:null }, { msgPlant:sc });\n  }\n  onDraft(e){ this.setState({ draft: e.target.value }); }\n  onKey(e){ if(e.key === 'Enter'){ e.preventDefault(); this.send(); } }\n  send(){ const t = (this.state.draft || '').trim(); if(t) this.ask(t); }\n  ask(t){\n    this.setState(s => ({ messages: [...s.messages, { u: true, t }], draft: '', typing: true, copilotOpen: true }));\n    const reply = this.replyFor(t);\n    setTimeout(() => this.setState(s => ({ messages: [...s.messages, { u: false, t: reply }], typing: false })), 650);\n  }\n  replyFor(x){\n    const t = x.toLowerCase();\n    if(/shut ?down|switch off|stop|turn off/.test(t)) return 'No, an immediate shutdown is not required. Methane (47.6%) is below target, but temperature and pressure are stable. First review feedstock moisture and the latest lab sample within 24 h.';\n    if(/methane/.test(t)) return 'Methane has dropped from ~62% to 47.6% since this morning — below the normal threshold of 52%. Common cause: a change in feedstock composition or a delayed biological response.';\n    if(/h2s|h₂s|sulph|sulf/.test(t)) return 'H₂S is at 940 ppm and moving toward the warning range (800–1000 ppm). Together with the methane drop this points to a biological / gas-quality issue.';\n    if(/\\bph\\b|acid/.test(t)) return 'pH is at 6.7 — just below the stable range (6.8–7.5). Combined with the methane drop, this hints at early biological instability.';\n    if(/score|0\\.84|model|isolation|why/.test(t)) return 'The anomaly score 0.84 comes from the Isolation Forest model. The combination of low methane, rising H₂S and slightly low pH is unusual versus normal operation. Above 0.7 an expert review is triggered automatically.';\n    if(/recommend|action|do|next|step/.test(t)) return 'Recommended steps: 1) Review the latest lab sample, 2) Check feedstock batch notes, 3) Monitor the Digester 2 trend. All recommendations are approved by OEKOBIT experts.';\n    if(/report|month/.test(t)) return 'The June draft is ready: avg methane 57.2%, availability 98.6%, 12 alerts (10 resolved). It is awaiting expert approval before going to the customer.';\n    if(/plant|fleet|attention|which/.test(t)) return 'Right now only BioEnergy Saarland #03 needs attention (status: Warning, 3 open alerts). The other 4 plants are running in the normal range.';\n    if(/update|customer|status/.test(t)) return 'The weekly update for BioEnergy Saarland #03 contains an active warning, so it is not auto-sendable — it is routed for expert approval. The other updates were sent automatically.';\n    return 'Based on the current data, the main finding is a methane drop with rising H₂S at BioEnergy Saarland #03. Would you like an explanation, a recommended action, or a values overview?';\n  }\n\n  chip(s, label){\n    const M = { normal:['#1E9E63','#E4F4EA','Normal'], warning:['#C6841A','#FBEFD6','Warning'], critical:['#C94A4A','#F7E4E4','Critical'], info:['#2C87B4','#E4F1FA',''], sent:['#1E9E63','#E4F4EA','Auto-sent'], review:['#C6841A','#FBEFD6','Needs review'], draft:['#2C87B4','#E4F1FA','AI draft'], done:['#1E9E63','#E4F4EA','Reviewed'], open:['#C6841A','#FBEFD6','Open'], reply:['#1E9E63','#E4F4EA','Expert reply'] };\n    const c = M[s] || M.info;\n    return { chipStyle:`display:inline-block;padding:3px 11px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.02em;color:${c[0]};background:${c[1]}`, chipLabel: label || c[2] };\n  }\n\n  outcomeChip(oc){\n    const M = { approve:['Anomaly confirmed','#1E9E63','#E4F4EA','#DCEBE4','#F2F9F5'], edit:['Recommendation adjusted','#2C87B4','#E4F1FA','#D8E9F2','#F3F9FC'], false:['False alarm','#C6841A','#FBEFD6','#F1E2C4','#FDF8EE'], data:['More data requested','#C94A4A','#F7E4E4','#F0D6D6','#FCF4F4'], closed:['Case closed','#798183','#EEF0F1','#E6E9E9','#F7F8F8'] };\n    const c = M[oc] || M.closed;\n    return { label:c[0], color:c[1], chipBg:c[2], border:c[3], bg:c[4] };\n  }\n\n  anomDef(){\n    return {\n      0:{ title:'Methane + H₂S + pH anomaly', time:'10:42', count:3, category:'Biological / gas quality', score:'0.84', scoreArc:'274 327', risk:'High', riskArc:'255 327', ruleStatus:'Warning', worst:'warning',\n        elevated:[{name:'methane_percent',label:'Methane',value:'47.6%',status:'warning',normal:'norma
